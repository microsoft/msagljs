<html>
  <head>
    <title>deck.gl renderer with MSAGL-JS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      html, body {
        height: 100%;
      }
      body {
        margin: 0;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        font-family: 'Lucida Sans', 'Lucida Sans Regular', 'Lucida Grande', 'Lucida Sans Unicode', Geneva, Verdana, sans-serif;
        font-size: 13px;
      }
      #top-bar {
        flex: 0 0 auto;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        row-gap: 6px;
        column-gap: 12px;
        min-height: 50px;
        padding: 6px 12px;
        background: #fff;
        box-shadow: 0 -1px 12px rgba(0, 0, 0, 0.3);
        z-index: 1;
      }
      #drop-target {
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 0 1 auto;
        min-width: 0;
        max-width: 100%;
      }
      #graph-name {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #url-loader {
        display: flex;
        align-items: center;
        gap: 6px;
        flex: 1 1 320px;
        min-width: 0;
      }
      #graph-url {
        flex: 1 1 auto;
        min-width: 0;
        padding: 4px 6px;
      }
      #load-url {
        padding: 4px 10px;
        cursor: pointer;
      }
      #viewer {
        position: relative;
        flex: 1 1 auto;
        min-height: 0;
      }
      #dot_files {
        cursor: pointer;
        position: relative;
        flex: 0 0 auto;
        padding: 0 12px;
        line-height: 36px;
      }
      #dot_files select {
        position: absolute;
        right: 0;
        opacity: 0;
        width: 100%;
        height: 100%;
        top: 0;
      }
      /* Phone / narrow viewports: push the URL loader onto its own row so the
         graph name (with node/edge counts) and the Sample-graphs menu stay
         visible on the first row instead of overlapping. */
      @media (max-width: 700px) {
        #url-loader {
          flex: 1 0 100%;
          order: 2;
        }
        #drop-target {
          flex: 1 1 auto;
        }
      }
      #settings {
        position: fixed;
        margin: 20px;
        padding: 20px;
        background: #fff;
        box-shadow: 0 -1px 12px rgba(0, 0, 0, 0.3);
        bottom: 0;
      }
      #settings > div {
        margin: 4px 0;
      }
      #settings.disabled {
        background-image: url('./spinner.gif');
        background-size: 48px;
        background-repeat: no-repeat;
        background-position: center center;
      }
      #settings.disabled > div {
        visibility: hidden;
      }
      #settings label {
        font-weight: bold;
        min-width: 120px;
        display: inline-block;
      }
      #settings select {
        width: 120px;
      }
      #drop-target.active {
        background: #ddd;
      }
      svg {
        margin: 0 12px;
      }
    </style>
  </head>

  <body>
    <div id="top-bar">
      <div id="drop-target" title="Open a local graph file">
        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 0 24 24" width="24px" fill="#000000">
          <path d="M0 0h24v24H0V0z" fill="none" />
          <path d="M9.17 6l2 2H20v10H4V6h5.17M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z" />
        </svg>
        <span id="graph-name"></span>
      </div>
      <div id="url-loader">
        <label for="graph-url" style="font-weight:bold;">URL:</label>
        <input id="graph-url" type="url" placeholder="https://.../graph.json  (or .json.gz, .gv.gz, .txt.gz)" />
        <button id="load-url" type="button">Load</button>
      </div>
      <div id="dot_files">
        <label>Sample graphs ▼</label>
        <select id="gv"></select>
      </div>
    </div>
    <div id="viewer">
      <div id="error-banner" style="display:none;position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:10;background:#d32f2f;color:#fff;padding:12px 24px;border-radius:6px;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-size:14px;max-width:80vw;cursor:pointer;" onclick="this.style.display='none'"></div>
    </div>
    <div id="settings">
      <div>
        <label>Layout:</label>
        <select id="layouts"></select>
      </div>
      <div>
        <label>Edge routing</label>
        <select id="routings"></select>
      </div>
      <div>
        <label>Smooth corners</label>
        <input type="checkbox" id="smoothCorners" />
      </div>
      </div>
    <script src="./app.js"></script>
  </body>
</html>

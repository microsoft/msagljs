# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Test Status

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      actions: write
      contents: write
      deployments: write
      packages: none
      pull-requests: write
      security-events: write


    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: yarn
      - run: yarn
      - run: yarn build
      - run: yarn test
      - name: Rebuild webgl-renderer for deployment
        run: cd examples/webgl-renderer && yarn build
      - name: Build docs
        run: |
          # Patch puppeteer launch to add --no-sandbox for CI
          sed -i 's/launch({ headless: true })/launch({ headless: true, args: ["--no-sandbox", "--disable-setuid-sandbox"] })/' node_modules/@rise4fun/docusaurus-remark-plugin-compile-code/lib/index.js
          yarn build:docs
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        # Only deploy from one matrix entry to avoid concurrent force-pushes
        # to gh-pages racing each other (one wins, the other fails).
        if: ${{ github.ref == 'refs/heads/dev' && matrix.node-version == '22.x' }}
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: website/build
          force_orphan: true
    
    